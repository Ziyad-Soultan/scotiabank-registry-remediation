# Inventory + dedupe child workflow.
#
# Purpose in the system:
# - Takes the running-image inventory produced by the existing cluster image dump / scan pipeline.
# - Normalizes image refs.
# - Deduplicates them into unique runtime artifacts.
# - Preserves every original sighting so we still know which clusters/workloads are impacted.
#
# Why it is needed:
# - The scanner may report the same vulnerable image across many namespaces and workloads.
# - The remediation pipeline should collapse those into one artifact record before planning refresh work.
#
# How it plugs in:
# - Upstream system writes images.json (or equivalent) to the shared handoff location.
# - This child turns the runtime list into unique-images + sightings.
# - The planner child then joins those unique images with existing scan metadata instead of rescanning everything.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: scotiabank-registry-remediator-inventory-dedup
  namespace: {{ .Values.namespace | quote }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name | quote }}
  entrypoint: inventory-dedup
  volumes:
    - name: shared-work
      persistentVolumeClaim:
        claimName: {{ .Values.argo.pvc.claimName | quote }}
    - name: dedupe-script
      configMap:
        name: scotiabank-registry-remediator-dedupe-script
        defaultMode: 0755
  templates:
    - name: inventory-dedup
      container:
        image: "{{ .Values.images.workflowUtils.repository }}:{{ .Values.images.workflowUtils.tag }}"
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            # Fail fast if the current scanner pipeline did not write the expected runtime image inventory.
            test -f {{ .Values.existingScanner.runningImageInventory.inputPath | quote }}

            # Convert many runtime sightings into:
            # - unique-images.json: one record per unique running artifact
            # - sightings.json: all original runtime locations preserved
            # - dedupe-summary.json: lightweight proof that duplicate runtime images were collapsed
            python /opt/remediator/deduplicate_image_records.py {{ .Values.existingScanner.runningImageInventory.inputPath | quote }} /tmp/dedupe-output
            mkdir -p {{ .Values.workflowPaths.dedupeOutputDir | quote }}
            cp /tmp/dedupe-output/* {{ .Values.workflowPaths.dedupeOutputDir | quote }}/
        volumeMounts:
          - name: shared-work
            mountPath: {{ .Values.argo.pvc.mountPath | quote }}
          - name: dedupe-script
            mountPath: /opt/remediator
      outputs:
        parameters:
          - name: unique-images
            valueFrom:
              # Small JSON used as control-plane input by the planning child.
              path: /tmp/dedupe-output/unique-images.min.json
        artifacts:
          - name: unique-images-artifact
            path: /tmp/dedupe-output/unique-images.json
          - name: sightings-artifact
            path: /tmp/dedupe-output/sightings.json
          - name: dedupe-summary-artifact
            path: /tmp/dedupe-output/dedupe-summary.json
