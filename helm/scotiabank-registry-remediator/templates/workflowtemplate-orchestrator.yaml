# Top-level orchestration workflow.
#
# Purpose in the system:
# - Coordinates the major phases in order.
# - Starts from per-cluster runtime inventory files, not a pre-merged single file.
# - Fans out only the expensive family-level refresh work that actually needs to happen.
#
# Why it is needed:
# - The repo now owns the upstream scan stage instead of depending on a never-shipped prod chart.
# - Argo gives explicit parent/child boundaries for dedupe -> scan -> plan -> acquire -> rebuild-handoff.
#
# How it plugs in:
# - Upstream collector charts or jobs drop one `images.json` per cluster into the shared inventory directory.
# - This orchestrator deduplicates the combined runtime inventory, scans the unique artifacts once,
#   converts findings into family refresh plans, then fans out one child refresh per internal base family.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: scotiabank-registry-remediator-orchestrator
  namespace: {{ .Values.namespace | quote }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name | quote }}
  entrypoint: orchestrate
  templates:
    - name: orchestrate
      steps:
        - - name: collect-cluster-images
            templateRef:
              name: scotiabank-registry-remediator-collect-cluster-images
              template: collect-cluster-images
        - - name: inventory-dedup
            templateRef:
              name: scotiabank-registry-remediator-inventory-dedup
              template: inventory-dedup
        - - name: scan-unique-images
            templateRef:
              name: scotiabank-registry-remediator-scan-unique-images
              template: scan-unique-images
        - - name: plan-family-refreshes
            templateRef:
              name: scotiabank-registry-remediator-scan-metadata-planner
              template: plan-refresh
        - - name: refresh-each-family
            templateRef:
              name: scotiabank-registry-remediator-refresh-base-family
              template: refresh-base-family
            arguments:
              parameters:
                - name: family-plan
                  value: "{{`{{item}}`}}"
            # Fan out one upstream acquisition + rebuild handoff per internal base family, not per vulnerable app image.
            withParam: "{{`{{steps.plan-family-refreshes.outputs.parameters.family-acquisition-fanout}}`}}"

    # Still intentionally left for later once the real work-repo pieces are copied in:
    # - state recording / family cooldown window
    # - candidate Trivy rescan after rebuild
    # - publication gate and moving tag update
    # - notifications / ownership handoff
