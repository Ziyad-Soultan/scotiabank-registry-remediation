# ConfigMaps that inject runtime metadata and helper scripts into the workflows.
#
# Purpose in the system:
# - Package example configs and Python helper scripts with the chart.
# - Make the workflows self-contained so Argo can mount what it needs at runtime.
#
# Why it is needed:
# - The platform now owns the upstream scan stage instead of only consuming existing metadata.
# - The workflows therefore need helpers for dedupe, scanning, planning, upstream acquisition,
#   and the placeholder rebuild handoff.
#
# How it plugs in:
# - inventory-dedup mounts the dedupe script ConfigMap.
# - scan-unique-images mounts the scan script ConfigMap.
# - plan-refresh mounts the metadata planner script ConfigMap.
# - refresh-base-family mounts the upstream acquisition and rebuild placeholder scripts.
apiVersion: v1
kind: ConfigMap
metadata:
  name: scotiabank-registry-remediator-ownership
  namespace: {{ .Values.namespace | quote }}
data:
  ownership-map.example.yaml: |
{{ .Files.Get "files/ownership-map.example.yaml" | nindent 4 }}
