# Global Helm naming overrides. Leave blank unless the cluster naming convention forces you
# to pin object names. These do not change system behavior; they only affect resource names.
nameOverride: ""
fullnameOverride: ""

# Namespace where the WorkflowTemplates, CronWorkflow, ConfigMaps, and optional PVC live.
# This is the logical home of the remediation control plane.
namespace: "REPLACE WITH target namespace for Argo workflows"

# The Argo workflow service account. The workflows need a service account because they will
# read ConfigMaps, mount PVCs, read cluster inventory handoff files, scan images, acquire
# upstream bases, and hand them to the rebuild process.
serviceAccount:
  create: false
  name: "REPLACE WITH service account name"

argo:
  workflowLabels:
    app.kubernetes.io/part-of: cluster-scan
  artifactRepository:
    bucketOrPath: "REPLACE WITH artifact repository bucket/path"
  pvc:
    enabled: true
    claimName: "REPLACE WITH PVC name for shared workflow data"
    mountPath: /work/shared
    storageClassName: "REPLACE WITH storage class name"
    size: 20Gi

schedule:
  # Optional CronWorkflow trigger for the nightly runtime reporting flow.
  cron: "REPLACE WITH cron schedule, e.g. 0 2 * * *"

images:
  workflowUtils:
    repository: python
    tag: "3.12-slim"
  trivy:
    repository: aquasec/trivy
    tag: "0.52.2"
  scannerWorker:
    # Worker image must include python3 and trivy.
    # Build this internally once you wire the real scan stage in cluster.
    repository: "REPLACE WITH internally approved trivy+python worker image"
    tag: "REPLACE WITH scanner worker image tag"
  builder:
    # Worker image must include python3 plus skopeo for approved upstream acquisition.
    repository: "REPLACE WITH internally approved skopeo worker image"
    tag: "REPLACE WITH builder image tag"
  rebuildWorker:
    # Placeholder for the future rebuild/cert worker copied from the work repo.
    # Expected to eventually include python3 plus whatever the real rebuild flow needs
    # (buildah/podman/certs/custom tooling/etc).
    repository: "REPLACE WITH internally approved rebuild worker image"
    tag: "REPLACE WITH rebuild worker image tag"

inventory:
  # The collector writes one prod-shaped `images.json` per cluster into this directory.
  # Dedupe reads the directory directly and preserves cross-cluster sightings.
  clusterImageInventoryPath: "/work/shared/cluster-images"
  fileGlob: "*.images.json"
  expectsPerClusterFiles: true
  collection:
    clusterConfigPath: "/opt/remediator/cluster-config/prod-clusters.example.json"
    kubectlBinary: "kubectl"
    timeoutSeconds: 180

scanner:
  # This repo now owns the scan stage instead of assuming production metadata already exists.
  # The scan worker should write one aggregated compact metadata file for the planner.
  metadataOutputPath: "/work/shared/scan-metadata.json"
  rawReportDir: "/work/shared/trivy-raw"
  mode: dry-run
  timeoutSeconds: 1800

familyCatalog:
  inputPath: "/opt/remediator/catalog/base-family-catalog.example.json"
  configMapName: cluster-scan-family-catalog

workflowPaths:
  dedupeOutputDir: "/work/shared/dedupe-output"
  runtimeReportingOutputDir: "/work/shared/runtime-reporting"
  runtimeDashboardHtmlPath: "/work/shared/runtime-reporting/index.html"
  refreshPlanOutputDir: "/work/shared/refresh-plan"
  upstreamBaseHandoffDir: "/work/shared/upstream-bases"
  rebuildOutputDir: "/work/shared/rebuild-output"

severityThresholds:
  actionable:
    - CRITICAL
    - HIGH

concurrency:
  inventory: 2
  planning: 2
  familyRefreshFanout: 2
  verificationFanout: 2

metadataMode:
  preferMetadataOnly: true
  keepFullImageArchives: false
  requireManagedBaseSignal: true

baseClassesEligibleForRefresh:
  - rhel-base
  - os-package
  - nginx
  - java-runtime
  - jdk-runtime
  - python-runtime

publication:
  candidateRegistry: "REPLACE WITH internal registry host for candidate images"
  publishMovingTags:
    - approved
    - stable
  immutableTagFormat: "YYYY.MM.DD-workflow"
  signImages: false

verification:
  maxCritical: 0
  maxHigh: 5
  requireRescan: true

refreshBaseFamily:
  # Default to a non-mutating run. Change to execute only after registry auth,
  # Red Hat access, family catalog entries, and review gates are wired in.
  mode: dry-run
  # There is no curated safe upstream list today. Model Red Hat as the authoritative upstream
  # source for now, then tighten policy later with family-level pinning and approval state.
  allowedUpstreamSourceTypes:
    - redhat-catalog
    - internal-approved-registry
  allowedUpstreamRegistries:
    - registry.redhat.io
  # Keep this false by default so the execution path still wants pinned digests even if
  # the current operating model chooses those digests manually from Red Hat for now.
  allowUnpinnedApprovedUpstream: false

rebuild:
  # Placeholder mode keeps the control plane contract stable until the real rebuild worker
  # is copied over from the work repo.
  mode: placeholder
  workRepoPath: "REPLACE WITH work-laptop rebuild repo path"
