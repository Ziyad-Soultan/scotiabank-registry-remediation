# Inventory + dedupe child workflow.
#
# Purpose in the system:
# - Takes the per-cluster running-image inventory files produced upstream.
# - Normalizes image refs.
# - Deduplicates them into unique runtime artifacts.
# - Preserves every original sighting so we still know which clusters/workloads are impacted.
#
# Why it is needed:
# - The same image shows up across many clusters and workloads.
# - The scan and remediation pipeline should collapse those into one artifact record before doing expensive work.
#
# How it plugs in:
# - Upstream collection drops one prod-shaped `images.json` per cluster into the shared inventory directory.
# - This child turns that directory into unique-images + sightings.
# - The scan child then scans the unique set once.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cluster-scan-inventory-dedup
  namespace: {{ .Values.namespace | quote }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name | quote }}
  entrypoint: inventory-dedup
  volumes:
    - name: shared-work
      persistentVolumeClaim:
        claimName: {{ .Values.argo.pvc.claimName | quote }}
    - name: dedupe-script
      configMap:
        name: cluster-scan-dedupe-script
        defaultMode: 0755
  templates:
    - name: inventory-dedup
      container:
        image: "{{ .Values.images.workflowUtils.repository }}:{{ .Values.images.workflowUtils.tag }}"
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            if [ -d {{ .Values.inventory.clusterImageInventoryPath | quote }} ]; then
              find {{ .Values.inventory.clusterImageInventoryPath | quote }} -maxdepth 1 -type f -name {{ .Values.inventory.fileGlob | quote }} | grep -q .
            else
              test -f {{ .Values.inventory.clusterImageInventoryPath | quote }}
            fi

            python /opt/remediator/deduplicate_image_records.py {{ .Values.inventory.clusterImageInventoryPath | quote }} /tmp/dedupe-output
            mkdir -p {{ .Values.workflowPaths.dedupeOutputDir | quote }}
            cp /tmp/dedupe-output/* {{ .Values.workflowPaths.dedupeOutputDir | quote }}/
        volumeMounts:
          - name: shared-work
            mountPath: {{ .Values.argo.pvc.mountPath | quote }}
          - name: dedupe-script
            mountPath: /opt/remediator
      outputs:
        parameters:
          - name: unique-images
            valueFrom:
              path: /tmp/dedupe-output/unique-images.min.json
        artifacts:
          - name: unique-images-artifact
            path: /tmp/dedupe-output/unique-images.json
          - name: sightings-artifact
            path: /tmp/dedupe-output/sightings.json
          - name: dedupe-summary-artifact
            path: /tmp/dedupe-output/dedupe-summary.json
