# Scan-metadata planning child workflow.
#
# Purpose in the system:
# - Reads compact vulnerability metadata produced by the scan stage.
# - Joins that metadata with deduplicated runtime images.
# - Produces deduplicated internal base-family refresh plans.
#
# Why it is needed:
# - The repo keeps the existing compact metadata contract even though it now owns the scan stage.
# - This preserves the current planner logic with minimal refactoring.
#
# How it plugs in:
# - inventory-dedup produces unique-images.json.
# - scan-unique-images produces scan-metadata.json.
# - this child reads both plus the base-family catalog and emits family-level fan-out input.
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cluster-scan-scan-metadata-planner
  namespace: {{ .Values.namespace | quote }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name | quote }}
  entrypoint: plan-refresh
  volumes:
    - name: shared-work
      persistentVolumeClaim:
        claimName: {{ .Values.argo.pvc.claimName | quote }}
    - name: planner-script
      configMap:
        name: cluster-scan-metadata-planner-script
        defaultMode: 0755
    - name: family-catalog
      configMap:
        name: {{ .Values.familyCatalog.configMapName | quote }}
  templates:
    - name: plan-refresh
      container:
        image: "{{ .Values.images.workflowUtils.repository }}:{{ .Values.images.workflowUtils.tag }}"
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            test -f {{ .Values.workflowPaths.dedupeOutputDir | quote }}/unique-images.json
            test -f {{ .Values.scanner.metadataOutputPath | quote }}
            test -f {{ .Values.familyCatalog.inputPath | quote }}

            python /opt/remediator/plan_base_refresh_from_scan_metadata.py \
              {{ .Values.workflowPaths.dedupeOutputDir | quote }}/unique-images.json \
              {{ .Values.scanner.metadataOutputPath | quote }} \
              {{ .Values.familyCatalog.inputPath | quote }} \
              /tmp/refresh-plan
            mkdir -p {{ .Values.workflowPaths.refreshPlanOutputDir | quote }}
            cp /tmp/refresh-plan/* {{ .Values.workflowPaths.refreshPlanOutputDir | quote }}/
        volumeMounts:
          - name: shared-work
            mountPath: {{ .Values.argo.pvc.mountPath | quote }}
          - name: planner-script
            mountPath: /opt/remediator
          - name: family-catalog
            mountPath: /opt/remediator/catalog
      outputs:
        parameters:
          - name: family-acquisition-fanout
            valueFrom:
              path: /tmp/refresh-plan/family-acquisition-fanout.min.json
        artifacts:
          - name: image-evaluations-artifact
            path: /tmp/refresh-plan/image-evaluations.json
          - name: family-refresh-plans-artifact
            path: /tmp/refresh-plan/family-refresh-plans.json
          - name: family-acquisition-fanout-artifact
            path: /tmp/refresh-plan/family-acquisition-fanout.min.json
          - name: family-refresh-summary-artifact
            path: /tmp/refresh-plan/family-refresh-summary.json
